<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Heritage Reach - Final Premium Edition</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body>

<section class="global-reach">
    <div class="container">
        <h4 class="sub-title">SUPPLY CHAIN VELOCITY</h4>
        <h1 class="main-title">Global Reach: Heritage Beyond Borders.</h1>
        <p class="description">Verified GI exports flowing from the heart of Bangladesh to 15+ global destinations.</p>

        <div class="map-3d-wrapper">
            <div class="map-bg-glow"></div>
            
            <img src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&q=80&w=2000" alt="World Map" class="bg-3d-map">
            
            <div class="map-overlay"></div>
            
            <svg id="global-map" viewBox="0 0 1000 850">
                <circle cx="500" cy="350" r="8" class="hub-point" />
                <circle cx="500" cy="350" r="20" class="hub-pulse" />
                <text x="500" y="395" class="hub-text">CENTRAL HUB (Dhaka)</text>
                </svg>

            <div class="stat-boxes">
                <div class="box"><span>ORIGIN</span><strong>64 Districts</strong></div>
                <div class="box highlight"><span>PROCESSING</span><strong>Dhaka Hub</strong></div>
                <div class="box"><span>REACH</span><strong>15+ Countries</strong></div>
            </div>
        </div>
    </div>
</section>

<script src="main.js"></script>
</body>
</html>
